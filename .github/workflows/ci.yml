name: ForgeFlow CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        
    - name: Verify dependencies
      run: go mod download
      
    - name: Vet
      run: go vet ./...
      
    - name: Build API
      run: go build -v ./cmd/api
      
    - name: Build Scheduler
      run: go build -v ./cmd/scheduler
      
    - name: Build Worker
      run: go build -v ./cmd/worker

    - name: Run Tests
      run: go test -v -race -cover ./...
